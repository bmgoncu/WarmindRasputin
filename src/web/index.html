<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rasputin — orb</title>
<style>
  /* Near-black, not pure black: the overlay is transparent in production, and a flat black
     dev backdrop hides whether the orb's darkest tones are actually rendering. */
  html, body { margin: 0; height: 100%; background: #0a0405; overflow: hidden; }
  #orb { display: block; width: 100vw; height: 100vh; }
  #ui {
    position: fixed; left: 16px; bottom: 16px; display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap; max-width: calc(100vw - 32px);
    font: 12px ui-monospace, monospace; color: #c98a6a; user-select: none;
  }
  #ui input { width: 220px; }
  #ui #shake, #ui #reach, #ui #jolts, #ui #arcs { width: 110px; }
  #ui label { display: flex; gap: 6px; align-items: center; }
  #ui button { font: inherit; background: #2a1512; color: #e6a883; border: 1px solid #5a2a1e;
               padding: 4px 10px; border-radius: 3px; cursor: pointer; }
  #readout { min-width: 3em; }
  #say {
    position: fixed; left: 16px; top: 16px; display: flex; gap: 8px; align-items: center;
    font: 12px ui-monospace, monospace; color: #c98a6a;
  }
  #say input[type=text] { width: 320px; background: #1a0c0a; color: #f0c0a0; border: 1px solid #5a2a1e;
                          padding: 5px 8px; border-radius: 3px; font: inherit; }
  #say select, #say button { font: inherit; background: #2a1512; color: #e6a883;
                             border: 1px solid #5a2a1e; padding: 4px 8px; border-radius: 3px; cursor: pointer; }
  #link { font-size: 11px; opacity: 0.7; }
  #link.on { color: #7fe08a; }
  #link.bad { color: #ff8a6a; opacity: 1; }
  #say button:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>
  <canvas id="orb"></canvas>
  <div id="say">
    <input id="text" type="text" placeholder="say something as Rasputin&hellip;" />
    <select id="chain"><option>measured</option><option>warmind</option><option>plain</option></select>
    <button id="send">speak</button>
    <span id="link">offline</span>
  </div>
  <div id="ui">
    <input id="level" type="range" min="0" max="100" value="0" />
    <span id="readout">0.00</span>
    <button id="mode">manual</button>
    <button id="floor">floor 0.22</button>
    <label>shake <input id="shake" type="range" min="0" max="200" value="100" /></label>
    <span id="shakeout">1.00x</span>
    <label>reach <input id="reach" type="range" min="120" max="220" value="178" /></label>
    <span id="reachout">1.78</span>
    <label>jolts <input id="jolts" type="range" min="0" max="50" value="5" /></label>
    <span id="joltsout">5</span>
    <label>arcs <input id="arcs" type="range" min="0" max="30" value="3" /></label>
    <span id="arcsout">3</span>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
